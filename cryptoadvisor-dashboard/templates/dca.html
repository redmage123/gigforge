{% extends "base.html" %}
{% block content %}
<h1>DCA Calculator</h1>
<div class="card">
    <h3>Backtest Strategy</h3>
    <div class="controls" style="flex-wrap:wrap;">
        <select id="dca-coin" class="form-input" style="width:150px;min-width:auto;"><option value="bitcoin">Bitcoin</option><option value="ethereum">Ethereum</option><option value="solana">Solana</option><option value="cardano">Cardano</option><option value="polkadot">Polkadot</option></select>
        <select id="dca-freq" class="form-input" style="width:130px;min-width:auto;"><option value="daily">Daily</option><option value="weekly" selected>Weekly</option><option value="monthly">Monthly</option></select>
        <input type="number" id="dca-amount" placeholder="$ per buy" class="form-input" style="width:130px;min-width:auto;" value="100" step="10">
        <select id="dca-days" class="form-input" style="width:130px;min-width:auto;"><option value="90">90 days</option><option value="180">180 days</option><option value="365" selected>1 year</option></select>
        <button id="dca-run-btn" class="btn">Run Backtest</button>
    </div>
</div>
<div id="dca-results" style="display:none;">
    <div class="grid grid-3" id="dca-stats"></div>
    <div class="card"><h3>DCA vs Lump Sum</h3><div id="dca-chart" style="height:400px;"></div></div>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/dca.js"></script>{% endblock %}
