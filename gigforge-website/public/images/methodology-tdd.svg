<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180" aria-label="TDD cycle diagram: RED write failing test, GREEN make it pass, REFACTOR clean the code">
  <title>TDD Cycle — RED, GREEN, REFACTOR</title>

  <!-- Background -->
  <rect width="600" height="180" fill="#0f172a" rx="12"/>

  <!-- RED circle -->
  <circle cx="110" cy="90" r="60" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="110" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">RED</text>
  <text x="110" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Write failing</text>
  <text x="110" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">test</text>

  <!-- Arrow RED → GREEN -->
  <path d="M172 90 L210 90" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="210,85 220,90 210,95" fill="#3b82f6"/>

  <!-- GREEN circle -->
  <circle cx="300" cy="90" r="60" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="300" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#10b981" text-anchor="middle">GREEN</text>
  <text x="300" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Make the</text>
  <text x="300" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">test pass</text>

  <!-- Arrow GREEN → REFACTOR -->
  <path d="M362 90 L400 90" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="400,85 410,90 400,95" fill="#3b82f6"/>

  <!-- REFACTOR circle -->
  <circle cx="490" cy="90" r="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="490" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">REFACTOR</text>
  <text x="490" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Clean the</text>
  <text x="490" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">code</text>

  <!-- Cycle-back arrow REFACTOR → RED (curved, above) -->
  <path d="M490 30 Q300 -10 110 30" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,4" fill="none" opacity="0.4"/>
  <polygon points="108,24 104,36 116,32" fill="#3b82f6" opacity="0.4"/>
</svg>
