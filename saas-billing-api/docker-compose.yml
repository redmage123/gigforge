version: '3.9'

services:
  api:
    build:
      context: .
      target: runner
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/saas_billing
      JWT_SECRET: dev-secret-change-in-production
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_mock}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_mock}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saas_net

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_billing
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d saas_billing']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - saas_net

volumes:
  pg_data:

networks:
  saas_net:
    driver: bridge
