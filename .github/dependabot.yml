version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/crm/backend"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
  - package-ecosystem: "pip"
    directory: "/cryptoadvisor-dashboard"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
  - package-ecosystem: "npm"
    directory: "/gigforge-website"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "frontend"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["ci"]
