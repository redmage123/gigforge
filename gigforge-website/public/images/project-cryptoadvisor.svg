<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Chart lines -->
  <polyline points="80,350 160,280 240,310 320,200 400,220 480,150 560,180 640,100 720,130" fill="none" stroke="url(#accent)" stroke-width="3"/>
  <polyline points="80,320 160,340 240,290 320,300 400,250 480,270 560,210 640,190 720,170" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <!-- Candles -->
  <rect x="155" y="270" width="10" height="40" fill="#22c55e" opacity="0.8"/>
  <rect x="235" y="290" width="10" height="30" fill="#ef4444" opacity="0.8"/>
  <rect x="315" y="190" width="10" height="40" fill="#22c55e" opacity="0.8"/>
  <rect x="395" y="210" width="10" height="30" fill="#ef4444" opacity="0.8"/>
  <rect x="475" y="140" width="10" height="40" fill="#22c55e" opacity="0.8"/>
  <rect x="555" y="170" width="10" height="30" fill="#22c55e" opacity="0.8"/>
  <rect x="635" y="90" width="10" height="40" fill="#22c55e" opacity="0.8"/>
  <!-- Grid -->
  <line x1="80" y1="100" x2="720" y2="100" stroke="#334155" stroke-width="0.5"/>
  <line x1="80" y1="200" x2="720" y2="200" stroke="#334155" stroke-width="0.5"/>
  <line x1="80" y1="300" x2="720" y2="300" stroke="#334155" stroke-width="0.5"/>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="24" font-weight="bold">CryptoAdvisor Dashboard</text>
  <!-- Coins -->
  <circle cx="120" cy="410" r="15" fill="#f7931a" opacity="0.8"/>
  <text x="120" y="415" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">BTC</text>
  <circle cx="170" cy="410" r="15" fill="#627eea" opacity="0.8"/>
  <text x="170" y="415" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">ETH</text>
  <circle cx="220" cy="410" r="15" fill="#9945ff" opacity="0.8"/>
  <text x="220" y="415" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">SOL</text>
</svg>
